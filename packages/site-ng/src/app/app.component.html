<div class="app">
  <div class="topbar">
    <div class="title">提示词</div>
    <div class="actions">
      <button
        class="template-btn"
        *ngFor="let template of templates"
        (click)="loadTemplate(template)"
        [class.active]="currentTemplateName === template.name"
      >
        {{ template.name }}
      </button>

      <button class="icon-btn" type="button" title="保存为模板" (click)="saveTemplate()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
          <polyline points="17 21 17 13 7 13 7 21"></polyline>
          <polyline points="7 3 7 8 15 8"></polyline>
        </svg>
      </button>

      <span class="sep">|</span>

      <button class="icon-btn" type="button" title="插入编辑块" (click)="addBlock()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
      </button>
    </div>
  </div>

  <agent-prompt-editor [(ngModel)]="editorModel">
    <!-- <ng-template #editPopup let-comp let-block="block" let-style="style">
      <div class="popup-content">
        自定义编辑块弹窗：{{ block.id }}
      </div>
    </ng-template> -->

    <ng-template #pluginPopup let-comp let-library="library" let-style="style">
      <div class="plugin-category">
        <div class="category-title">用户变量</div>
        <div *ngFor="let name of library.userVariables" class="variable-item" (click)="addVariableBlock(name)">
          <span class="item-name">{{ name }}</span>
        </div>
      </div>
      <div class="plugin-category">
        <div class="category-title">输入参数</div>
        <div *ngFor="let name of library.inputVariables" class="variable-item" (click)="addVariableBlock(name)">
          <span class="item-name">{{ name }}</span>
        </div>
      </div>
      <div class="plugin-category">
        <div class="category-title">插件</div>
        <div *ngFor="let item of library.plugins" class="plugin-item" (click)="addPluginBlock(item)">
          <img src="assets/images/icon-mcp.svg" alt="plugin-icon">
          <span class="item-name">{{ item.name }}</span>
        </div>
      </div>
      <div class="plugin-category">
        <div class="category-title">工作流</div>
        <div *ngFor="let item of library.workflows" class="plugin-item" (click)="addPluginBlock(item)">
          <img src="assets/images/icon-workflow.svg" alt="workflow-icon">
          <span class="item-name">{{ item.name }}</span>
        </div>
      </div>
    </ng-template>

    <ng-template #aiDialog let-comp let-style="style">
      <!-- AI 响应内容 -->
      <div *ngIf="comp.aiResponseText" class="ai-response-area" #aiResponseArea>
        <div class="ai-response-content">{{ comp.aiResponseText }}</div>
        <div *ngIf="comp.aiLoading" class="ai-loading-indicator">
          <span class="dot"></span>
        </div>
        <div *ngIf="comp.aiFinished && !comp.aiLoading" class="ai-result-actions">
          <button class="btn-insert" (click)="comp.insertAIResult()">插入</button>
          <button class="btn-cancel" (click)="comp.cancelAIResult()">取消</button>
        </div>
      </div>

      <!-- 输入区域 -->
      <div class="ai-input-container" [class.is-generating]="comp.isGenerating">
        <i class="icon-sparkle-small"></i>
        <input 
          type="text" 
          [(ngModel)]="comp.aiQuestion" 
          (keyup.enter)="comp.sendAIQuestion()"
          placeholder="你希望如何编写或优化提示词？"
          [disabled]="comp.isGenerating"
        >
        <div class="ai-actions">
          <button *ngIf="!comp.isGenerating" class="btn-send" (click)="comp.sendAIQuestion()" [disabled]="!comp.aiQuestion">
            <i class="icon-send"></i>
          </button>
          <button *ngIf="comp.isGenerating" class="btn-stop" (click)="comp.stopAIResponse()">
            <i class="icon-stop"></i> 停止响应
          </button>
        </div>
      </div>
      
      <div *ngIf="comp.isGenerating || comp.aiResponseText" class="ai-dialog-footer">
        内容由 AI 生成，无法确保真实准确，仅供参考。
      </div>
    </ng-template>
  </agent-prompt-editor>
</div>

<router-outlet />
